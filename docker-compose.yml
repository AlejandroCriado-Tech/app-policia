services:
  db:
    image: mariadb:10.4
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/var/lib/mysql
      - ./db/academia_policia.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3308:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8080:80"

volumes:
  db_data: